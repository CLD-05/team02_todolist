<!DOCTYPE html>
<html>
<head>
    <title>Todo</title>
</head>
<body>

<h2>Todo 목록</h2>

<button onclick="logout()">로그아웃</button>

<hr>

<h3>할 일 추가</h3>
<input type="text" id="content" placeholder="할 일 입력">
<button onclick="createTodo()">추가</button>

<hr>

<h3>목록</h3>
<ul id="todoList"></ul>

<script>
function loadTodos() {
    fetch("/todos")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("todoList");
            list.innerHTML = "";

            data.data.forEach(todo => {
                const li = document.createElement("li");
                li.innerText = todo.content + " (" + todo.status + ")";
                list.appendChild(li);
            });
        });
}

function createTodo() {
    const content = document.getElementById("content").value;

    fetch("/todos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content: content
        })
    })
    .then(res => res.json())
    .then(() => {
        loadTodos();
    });
}

function logout() {
    fetch("/logout", {
        method: "POST"
    }).then(() => {
        location.href = "/login";
    });
}

loadTodos();
</script>

</body>
</html>
