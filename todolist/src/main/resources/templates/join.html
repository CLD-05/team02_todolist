<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 · TodoList</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .join-wrap { min-height: 100vh; display: flex; }

    .join-brand {
      width: 420px; flex-shrink: 0; background: #3D5A80;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 40px;
      position: relative; overflow: hidden;
    }
    .join-brand::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(238,108,77,0.15);
    }
    .join-brand::after {
      content: ''; position: absolute; bottom: -60px; left: -60px;
      width: 240px; height: 240px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .join-brand-logo {
      font-family: 'Nunito', sans-serif; font-size: 42px;
      font-weight: 800; color: #fff; margin-bottom: 16px;
      position: relative; z-index: 1;
    }
    .join-brand-logo span { color: #EE6C4D; }
    .join-brand-desc {
      color: rgba(255,255,255,0.75); font-size: 15px; text-align: center;
      line-height: 1.7; position: relative; z-index: 1; margin-bottom: 40px;
    }
    .join-feature-list { list-style: none; width: 100%; position: relative; z-index: 1; }
    .join-feature-list li {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.85); font-size: 14px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .join-feature-list li:last-child { border-bottom: none; }
    .join-feature-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(238,108,77,0.25); display: flex;
      align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .join-form-panel {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 48px 40px; background: var(--bg);
    }
    .join-form-box { width: 100%; max-width: 430px; }
    .join-form-title {
      font-family: 'Nunito', sans-serif; font-size: 28px;
      font-weight: 800; color: var(--text); margin-bottom: 6px;
    }
    .join-form-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .join-step { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .join-step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .join-step-text {
      font-size: 12px; font-weight: 600; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .email-row { display: flex; gap: 8px; align-items: center; }
    .email-row .form-control,
    .email-row .form-select { flex: 1; }
    .email-at { font-weight: 700; color: var(--text-muted); }
    .field-error {
      margin-top: 6px;
      font-size: 13px;
      color: #d9534f;
    }

    @media (max-width: 768px) {
      .join-wrap { flex-direction: column; }
      .join-brand { width: 100%; padding: 40px 24px; }
      .join-feature-list { display: none; }
      .join-brand-desc { margin-bottom: 0; }
      .join-form-panel { padding: 36px 24px; }
      .email-row { flex-direction: column; align-items: stretch; }
      .email-at { display: none; }
    }
  </style>
</head>
<body>
<div class="join-wrap">

  <div class="join-brand">
    <div class="join-brand-logo">Todo<span>List</span></div>
    <p class="join-brand-desc">할 일을 쉽고 빠르게 관리하고<br>매일의 목표를 달성해보세요</p>
    <ul class="join-feature-list">
      <li><div class="join-feature-icon">✅</div><span>체크박스로 간편하게 완료 처리</span></li>
      <li><div class="join-feature-icon">📋</div><span>진행중 / 대기중 / 완료 상태 관리</span></li>
      <li><div class="join-feature-icon">🗑</div><span>완료된 항목 한번에 정리</span></li>
      <li><div class="join-feature-icon">🔒</div><span>나만의 개인 Todo 리스트</span></li>
    </ul>
  </div>

  <div class="join-form-panel">
    <div class="join-form-box">

      <div class="join-step">
        <div class="join-step-dot"></div>
        <span class="join-step-text">새 계정 만들기</span>
      </div>

      <h2 class="join-form-title">회원가입</h2>
      <p class="join-form-sub">정보를 입력하고 시작해보세요</p>

      <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

      <form th:action="@{/users/join}" th:object="${joinRequestDto}" method="post" id="joinForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{email}" id="email">

        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <input class="form-control"
                 type="text"
                 id="nickname"
                 th:field="*{nickname}"
                 placeholder="사용할 닉네임을 입력하세요"
                 autofocus
                 maxlength="20">
          <p class="field-error"
             th:if="${#fields.hasErrors('nickname')}"
             th:errors="*{nickname}"></p>
        </div>

        <div class="form-group">
          <label class="form-label">이메일</label>
          <div class="email-row">
            <input class="form-control"
                   type="text"
                   id="emailId"
                   placeholder="아이디 입력"
                   autocomplete="off">
            <span class="email-at">@</span>
            <select class="form-control form-select" id="emailDomainSelect">
              <option value="">도메인 선택</option>
              <option value="gmail.com">gmail.com</option>
              <option value="naver.com">naver.com</option>
              <option value="daum.net">daum.net</option>
              <option value="hanmail.net">hanmail.net</option>
              <option value="kakao.com">kakao.com</option>
              <option value="nate.com">nate.com</option>
              <option value="outlook.com">outlook.com</option>
              <option value="hotmail.com">hotmail.com</option>
              <option value="직접입력">직접 입력</option>
            </select>
          </div>

          <div style="margin-top:10px;">
            <input class="form-control"
                   type="text"
                   id="emailDomainCustom"
                   placeholder="직접 입력 도메인"
                   style="display:none;"
                   autocomplete="off">
          </div>

          <p class="field-error"
             th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-control"
                 type="password"
                 id="password"
                 th:field="*{password}"
                 placeholder="비밀번호를 입력하세요">
          <p class="field-error"
             th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
          <input class="form-control"
                 type="password"
                 id="passwordConfirm"
                 th:field="*{passwordConfirm}"
                 placeholder="비밀번호를 한 번 더 입력하세요">
          <p class="field-error"
             th:if="${#fields.hasErrors('passwordConfirm')}"
             th:errors="*{passwordConfirm}"></p>
        </div>

        <button type="submit" class="btn btn-accent" style="width:100%; margin-top:8px;">
          가입하기
        </button>
      </form>

      <p class="text-center mt-24" style="font-size:14px; color:#7A8A9A;">
        이미 계정이 있으신가요?
        <a class="link" th:href="@{/login}">로그인</a>
      </p>

    </div>
  </div>

</div>

<script>
  const joinForm = document.getElementById('joinForm');
  const emailId = document.getElementById('emailId');
  const emailDomainSelect = document.getElementById('emailDomainSelect');
  const emailDomainCustom = document.getElementById('emailDomainCustom');
  const emailHidden = document.getElementById('email');

  emailDomainSelect.addEventListener('change', function () {
    if (this.value === '직접입력') {
      emailDomainCustom.style.display = 'block';
      emailDomainCustom.value = '';
      emailDomainCustom.focus();
    } else {
      emailDomainCustom.style.display = 'none';
      emailDomainCustom.value = '';
    }
  });

  joinForm.addEventListener('submit', function (e) {
    const idValue = emailId.value.trim();
    let domainValue = emailDomainSelect.value === '직접입력'
      ? emailDomainCustom.value.trim()
      : emailDomainSelect.value.trim();

    if (!idValue || !domainValue) {
      e.preventDefault();
      alert('이메일 아이디와 도메인을 모두 입력해주세요.');
      return;
    }

    emailHidden.value = idValue + '@' + domainValue;
  });
</script>
</body>
</html>
