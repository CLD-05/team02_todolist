<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${todo != null} ? '할 일 수정' : '새 할 일'">할 일 - TodoList</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/todos}">
    Todo<span style="color:#EE6C4D;">List</span>
  </a>
  <div class="navbar-actions">
    <a class="btn btn-outline btn-sm" th:href="@{/todos}">← 목록으로</a>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<div class="main-content">
  <div class="form-card">

    <!-- 페이지 제목 -->
    <h2 class="card-title" th:text="${todo != null} ? '할 일 수정' : '새 할 일 추가'">
      새 할 일 추가
    </h2>
    <p class="card-subtitle" th:text="${todo != null} ? '내용을 수정해보세요' : '오늘 할 일을 작성해보세요'">
      오늘 할 일을 작성해보세요
    </p>

    <!-- 에러 메시지 -->
    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <!-- 작성 폼 (신규) -->
    <form th:if="${todo == null}" th:action="@{/todos}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-group">
        <label class="form-label" for="content">할 일 내용</label>
        <textarea class="form-control"
                  id="content"
                  name="content"
                  placeholder="오늘 무엇을 할 예정인가요?"
                  rows="4"
                  required></textarea>
      </div>

      <div class="form-actions">
        <a class="btn btn-outline" th:href="@{/todos}">취소</a>
        <button type="submit" class="btn btn-accent">추가하기</button>
      </div>
    </form>

    <!-- 수정 폼 -->
    <form th:if="${todo != null}" th:action="@{/todos/{id}/edit(id=${todo.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-group">
        <label class="form-label" for="content-edit">할 일 내용</label>
        <textarea class="form-control"
                  id="content-edit"
                  name="content"
                  rows="4"
                  required
                  th:text="${todo.content}"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="status">상태</label>
        <select class="select-control" id="status" name="status">
          <option value="PENDING"
                  th:selected="${todo.status.name() == 'PENDING'}">⏳ 대기중</option>
          <option value="IN_PROGRESS"
                  th:selected="${todo.status.name() == 'IN_PROGRESS'}">🔥 진행중</option>
          <option value="COMPLETED"
                  th:selected="${todo.status.name() == 'COMPLETED'}">✅ 완료</option>
        </select>
      </div>

      <div class="form-actions">
        <a class="btn btn-outline" th:href="@{/todos}">취소</a>
        <button type="submit" class="btn btn-primary">수정 완료</button>
      </div>
    </form>

  </div>
</div>
</body>
</html>
