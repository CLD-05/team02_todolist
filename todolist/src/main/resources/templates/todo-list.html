<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록 - TodoList</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/todos}">
    Todo<span>List</span>
  </a>

  <div class="navbar-actions">
    <!-- 닉네임 표시 -->
    <span style="font-size:14px; color:#7A8A9A;" th:text="${nickname} + '님'"></span>

    <!-- 로그아웃 -->
    <form th:action="@{/logout}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
    </form>

    <!-- 회원탈퇴 -->
    <form th:action="@{/users/delete}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-danger btn-sm"
              onclick="return confirm('정말 탈퇴하시겠습니까?\n탈퇴 시 모든 할 일이 삭제됩니다.')">
        회원탈퇴
      </button>
    </form>
  </div>
</nav>

<div class="main-content">

  <div class="page-header">
    <div>
      <h1 class="page-title">오늘의 <span>할 일</span></h1>
      <p style="color:#7A8A9A; font-size:14px; margin-top:4px;">
        총 <strong th:text="${totalCount}">0</strong>개의 할 일이 있어요
      </p>
    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <!-- 완료 항목 있을 때만 표시 -->
      <form th:if="${completedCount > 0}"
            th:action="@{/todos/delete-completed}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-danger btn-sm"
                onclick="return confirm('완료된 할 일을 모두 삭제하시겠습니까?')">
          🗑 완료 삭제
        </button>
      </form>
      <a class="btn btn-accent" th:href="@{/todos/new}">+ 새 할 일</a>
    </div>
  </div>

  <!-- 🔥 진행률 -->
  <!-- data-progress 속성으로 Thymeleaf 값 전달 (JS 인라인 오류 방지) -->
  <div id="progressWrap"
       th:data-progress="${progress}"
       style="margin-bottom:25px; padding:15px; border:1px solid #eee; border-radius:12px;">

    <h3 style="margin-bottom:10px;">오늘 진행률</h3>

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:13px; color:#7A8A9A;">완료율</span>
      <strong id="progressText">0%</strong>
    </div>

    <div style="width:100%; height:10px; background:#eee; border-radius:10px; margin-top:8px;">
      <div id="progressBar"
           style="height:10px;
                  background:linear-gradient(90deg,#4caf50,#81c784);
                  border-radius:10px;
                  width:0%;
                  transition: width 0.9s ease;">
      </div>
    </div>

    <p id="progressMsg" style="font-size:12px; color:#7A8A9A; margin-top:6px;">
      조금씩 진행 중이에요
    </p>

  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var wrap = document.getElementById('progressWrap');
      var progress = parseInt(wrap.getAttribute('data-progress'), 10);
      setTimeout(function () {
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('progressText').textContent = progress + '%';
        document.getElementById('progressMsg').textContent =
          progress === 100 ? '🎉 오늘 할 일 완료!' : '조금씩 진행 중이에요';
      }, 150);
    });
  </script>

  <div class="alert alert-success"
       th:if="${successMessage}"
       th:text="${successMessage}"></div>

  <!-- 진행중 -->
  <div class="section-header">
    <h2 class="section-title">진행 중인 할 일</h2>
    <span class="section-count" th:text="${activeTodos.size()} + '개'">0개</span>
  </div>

  <div class="todo-list" th:if="${!activeTodos.isEmpty()}">
    <div class="todo-item" th:each="todo : ${activeTodos}">

      <form th:action="@{/todos/{id}/status(id=${todo.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="status" value="COMPLETED">
        <button type="submit" class="todo-checkbox"></button>
      </form>

      <div class="todo-content">
        <p class="todo-text" th:text="${todo.content}"></p>
        <p style="font-size:12px; color:#7A8A9A;"
           th:text="${#temporals.format(todo.createdAt, 'yyyy.MM.dd HH:mm')}"></p>
      </div>

      <span class="todo-status"
            th:classappend="'status-' + ${todo.status.name()}"
            th:text="${todo.status.name() == 'PENDING'} ? '대기중' : '진행중'">
      </span>

      <div class="todo-actions">
        <a class="btn btn-outline btn-sm" th:href="@{/todos/{id}/edit(id=${todo.id})}">수정</a>

        <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-danger btn-sm"
                  onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
      </div>

    </div>
  </div>

  <div class="empty-state small" th:if="${activeTodos.isEmpty()}">
    <p>현재 진행 중인 할 일이 없어요</p>
  </div>

  <!-- 완료 -->
  <div class="section-header completed-header">
    <h2 class="section-title">완료된 할 일</h2>
    <span class="section-count" th:text="${completedTodos.size()} + '개'">0개</span>
  </div>

  <div class="todo-list" th:if="${!completedTodos.isEmpty()}">
    <div class="todo-item completed" th:each="todo : ${completedTodos}">

      <form th:action="@{/todos/{id}/status(id=${todo.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="status" value="PENDING">
        <button type="submit" class="todo-checkbox checked"></button>
      </form>

      <div class="todo-content">
        <p class="todo-text completed" th:text="${todo.content}"></p>
        <p style="font-size:12px; color:#7A8A9A;"
           th:text="${#temporals.format(todo.createdAt, 'yyyy.MM.dd HH:mm')}"></p>
      </div>

      <span class="todo-status status-COMPLETED">완료</span>

      <div class="todo-actions">
        <a class="btn btn-outline btn-sm" th:href="@{/todos/{id}/edit(id=${todo.id})}">수정</a>

        <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-danger btn-sm"
                  onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
      </div>

    </div>
  </div>

  <div class="empty-state small" th:if="${completedTodos.isEmpty()}">
    <p>아직 완료된 할 일이 없어요</p>
  </div>

</div>

</body>
</html>
