<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록 · TodoList</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/todos}">
    Todo<span>List</span>
  </a>
  <div class="navbar-actions">
    <span style="font-size:14px; color:#7A8A9A;" sec:authentication="name"></span>

    <!-- 로그아웃 -->
    <form th:action="@{/logout}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
    </form>

    <!-- 회원탈퇴 -->
    <form th:action="@{/users/delete}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-danger btn-sm"
              onclick="return confirm('정말 탈퇴하시겠습니까?\n탈퇴 시 모든 할 일이 삭제됩니다.')">
        회원탈퇴
      </button>
    </form>
  </div>
</nav>

<div class="main-content">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h2 class="page-title">오늘의 <span>할 일</span></h2>
      <p style="font-size:13px; color:#7A8A9A; margin-top:4px;">
        전체 <strong th:text="${todos.size()}">0</strong>개 ·
        완료 <strong th:text="${completedCount}">0</strong>개
      </p>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <!-- 완료 항목 있을 때만 표시 -->
      <form th:if="${completedCount > 0}"
            th:action="@{/todos/delete-completed}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-danger btn-sm"
                onclick="return confirm('완료된 할 일을 모두 삭제하시겠습니까?')">
          🗑 완료된 목록 삭제
        </button>
      </form>
      <a class="btn btn-accent btn-sm" th:href="@{/todos/new}">+ 새 할 일</a>
    </div>
  </div>

  <!-- 성공 메시지 -->
  <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

  <!-- Todo 목록 -->
  <div class="todo-list" th:if="${!todos.isEmpty()}">
    <div th:each="todo : ${todos}"
         class="todo-item"
         th:classappend="${todo.status.name() == 'COMPLETED'} ? ' completed' : ''">

      <!-- 체크박스 -->
      <form th:action="@{/todos/{id}/status(id=${todo.id})}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="status"
               th:value="${todo.status.name() == 'COMPLETED'} ? 'PENDING' : 'COMPLETED'">
        <button type="submit" class="todo-checkbox"
                th:classappend="${todo.status.name() == 'COMPLETED'} ? ' checked' : ''">
        </button>
      </form>

      <!-- 내용 -->
      <div class="todo-content">
        <p class="todo-text"
           th:classappend="${todo.status.name() == 'COMPLETED'} ? ' completed' : ''"
           th:text="${todo.content}">할 일 내용</p>
        <p style="font-size:12px; color:#7A8A9A; margin-top:4px;"
           th:text="${#temporals.format(todo.createdAt, 'yyyy.MM.dd HH:mm')}"></p>
      </div>

      <!-- 상태 배지 -->
      <span class="todo-status"
            th:classappend="'status-' + ${todo.status.name()}"
            th:text="${todo.status.name() == 'PENDING'} ? '대기중' :
                     (${todo.status.name() == 'IN_PROGRESS'} ? '진행중' : '완료')">
      </span>

      <!-- 수정/삭제 -->
      <div class="todo-actions">
        <a class="btn btn-outline btn-sm" th:href="@{/todos/{id}/edit(id=${todo.id})}">수정</a>
        <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" style="margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-danger btn-sm"
                  onclick="return confirm('삭제하시겠습니까?')">삭제</button>
        </form>
      </div>

    </div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty-state" th:if="${todos.isEmpty()}">
    <div class="icon">📝</div>
    <h3>할 일이 없어요!</h3>
    <p style="font-size:14px; margin-bottom:24px;">새로운 할 일을 추가해보세요</p>
    <a class="btn btn-accent" th:href="@{/todos/new}">+ 첫 번째 할 일 추가</a>
  </div>

</div>
</body>
</html>
