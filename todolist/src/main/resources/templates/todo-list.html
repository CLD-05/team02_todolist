<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록 - TodoList</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/todos}">
    Todo<span>List</span>
  </a>
  <div class="navbar-actions">
    <span style="font-size:14px; color:#7A8A9A;" sec:authentication="name"></span>
    <form th:action="@{/logout}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
    </form>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<div class="main-content">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">오늘의 <span>할 일</span></h1>
      <p style="color:#7A8A9A; font-size:14px; margin-top:4px;">
        총 <strong th:text="${todos.size()}">0</strong>개의 할 일이 있어요
      </p>
    </div>
    <a class="btn btn-accent" th:href="@{/todos/new}">
      + 새 할 일
    </a>
  </div>

  <!-- 성공 메시지 -->
  <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

  <!-- Todo 목록 -->
  <div class="todo-list" th:if="${!todos.isEmpty()}">
    <div class="todo-item" th:each="todo : ${todos}"
         th:classappend="${todo.status.name() == 'COMPLETED'} ? 'completed' : ''">

      <!-- 체크박스 버튼 -->
      <form th:action="@{/todos/{id}/status(id=${todo.id})}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="status"
               th:value="${todo.status.name() == 'COMPLETED'} ? 'PENDING' : 'COMPLETED'">
        <button type="submit" class="todo-checkbox"
                th:classappend="${todo.status.name() == 'COMPLETED'} ? 'checked' : ''">
        </button>
      </form>

      <!-- 내용 -->
      <div class="todo-content">
        <p class="todo-text"
           th:classappend="${todo.status.name() == 'COMPLETED'} ? 'completed' : ''"
           th:text="${todo.content}">할 일 내용</p>
        <p style="font-size:12px; color:#7A8A9A; margin-top:4px;"
           th:text="${#temporals.format(todo.createdAt, 'yyyy.MM.dd HH:mm')}">2024.01.01</p>
      </div>

      <!-- 상태 배지 -->
      <span class="todo-status"
            th:classappend="'status-' + ${todo.status.name()}"
            th:text="${todo.status.name() == 'PENDING'} ? '대기중' :
                     (${todo.status.name() == 'IN_PROGRESS'} ? '진행중' : '완료')">
      </span>

      <!-- 수정/삭제 버튼 -->
      <div class="todo-actions">
        <a class="btn btn-outline btn-sm" th:href="@{/todos/{id}/edit(id=${todo.id})}">수정</a>
        <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" style="margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-danger btn-sm"
                  onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
      </div>

    </div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty-state" th:if="${todos.isEmpty()}">
    <div class="icon">📝</div>
    <h3>할 일이 없어요!</h3>
    <p style="font-size:14px; margin-bottom:24px;">새로운 할 일을 추가해보세요</p>
    <a class="btn btn-accent" th:href="@{/todos/new}">+ 첫 번째 할 일 추가</a>
  </div>

</div>
</body>
</html>
